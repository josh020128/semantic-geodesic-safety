# Semantic Geodesic Risk Fields — default config
# Matches pipeline: Phase 0 (LLM dataset) → Loop 1 (grid + FMM + risk field)

# Phase 0: LLM prior / JSON dataset generation
llm:
  provider: gemini   # "openai" or "gemini"
  model: gemini-2.5-flash   # e.g. gpt-4o (openai); gemini-2.5-flash, gemini-2.0-flash (gemini)
  temperature: 0.0
  # When true, use a default prior if the API fails (e.g. quota exceeded). Lets you run without API.
  return_fallback_on_error: true

# Loop 1: Occupancy & grid (perception populates labels upstream)
occupancy:
  grid_resolution: 0.02   # meters per voxel
  free_speed: 1.0
  obstacle_speed: 0.0

# Loop 1: Risk field (from proposal)
risk_field:
  shielding_kappa: 2.0    # κ in A(x) = ((d_euc+ε)/(d_geo+ε))^κ
  shielding_eps: 1e-6
  decay_alpha: 1.0        # α in exp(-α * d_geo) inside risk_cost_field
  # Multi-hazard V_final via compute_logsumexp_superposition (smooth max, numerically stable)
  beta: 10.0               # higher → closer to max(V_i); lower → softer blend
  v_max: 10.0             # hard cap on combined cost for the trajectory optimizer
