# Conda environment for Semantic Geodesic Risk Fields
# Create: conda env create -f environment.yml
# Activate: conda activate semantic_safety

name: semantic_safety
channels:
  - conda-forge
  - defaults
dependencies:
  - python=3.11
  - pip
  - pip:
    - numpy>=1.24,<2.0
    - pyyaml>=6.0
    - scipy>=1.10
    - openai>=1.0
    - google-genai>=1.0.0
